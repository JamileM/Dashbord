<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Executivo</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #f5f6fa;
    margin: 20px;
}

h1 {
    text-align: center;
}

.container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
}

.card {
    background: white;
    padding: 20px;
    text-align: center;
    border-radius: 8px;
}

.card h2 {
    margin: 0;
    font-size: 30px;
}

.section {
    margin-top: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.table {
    margin-top: 20px;
    background: white;
    padding: 20px;
    border-radius: 8px;
}
</style>
</head>

<body>

<h1>Dashboard Executivo de Demandas</h1>

<div class="container">
    <div class="card">
        <p>Total</p>
        <h2 id="total">2787</h2>
    </div>
    <div class="card">
        <p>Ativas</p>
        <h2 id="ativas">149</h2>
    </div>
    <div class="card">
        <p>Atrasadas</p>
        <h2 id="atrasadas">45</h2>
    </div>
    <div class="card">
        <p>% Atraso</p>
        <h2 id="percent">16%</h2>
    </div>
</div>

<div class="section">
    <canvas id="statusChart"></canvas>
    <canvas id="devChart"></canvas>
</div>

<div class="table">
    <h3>Demandas Atrasadas</h3>
    <table width="100%">
        <tr>
            <th>Desenvolvedor</th>
            <th>Status</th>
            <th>Data</th>
        </tr>
        <tr>
            <td>Breno</td>
            <td style="color:red;">Atrasado</td>
            <td>16/06/2026</td>
        </tr>
    </table>
</div>

<script>
// Status
new Chart(document.getElementById('statusChart'), {
    type: 'bar',
    data: {
        labels: ['Concluído','Em andamento','On Hold','Cancelado'],
        datasets: [{
            data: [2490, 148, 21, 66],
            backgroundColor: ['green','blue','orange','red']
        }]
    }
});

// Desenvolvedores
new Chart(document.getElementById('devChart'), {
    type: 'bar',
    data: {
        labels: ['Breno','Lourival','Dennys','Bruno'],
        datasets: [{
            data: [677,330,177,161],
            backgroundColor: 'blue'
        }]
    },
    options: {
        indexAxis: 'y'
    }
});
</script>

</body>
</html>
