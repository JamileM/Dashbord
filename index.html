<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Executivo</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #f5f6fa;
    margin: 0;
    padding: 20px;
}

.header {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 20px;
}

.container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0px 3px 8px rgba(0,0,0,0.1);
}

.card p {
    color: #666;
}

.card h2 {
    margin: 5px;
    font-size: 28px;
}

.green { color: #28a745; }
.red { color: #dc3545; }
.blue { color: #007bff; }
.orange { color: #ffc107; }

.section {
    margin-top: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.chart-box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 3px 8px rgba(0,0,0,0.1);
}

.table {
    margin-top: 20px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 3px 8px rgba(0,0,0,0.1);
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    text-align: left;
    padding: 10px;
    background: #f1f1f1;
}

td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

tr:hover {
    background: #f9f9f9;
}
</style>
</head>

<body>

<div class="header">Dashboard Executivo de Demandas</div>

<div class="container">
    <div class="card">
        <p>Total Demandas</p>
        <h2>2787</h2>
    </div>

    <div class="card">
        <p>Demandas Ativas</p>
        <h2 class="blue">149</h2>
    </div>

    <div class="card">
        <p>Demandas Atrasadas</p>
        <h2 class="red">45</h2>
    </div>

    <div class="card">
        <p>% Atraso</p>
        <h2 class="orange">16%</h2>
    </div>
</div>

<div class="section">

    <div class="chart-box">
        <h3>Status das Demandas</h3>
        <canvas id="statusChart"></canvas>
    </div>

    <div class="chart-box">
        <h3>Demandas por Desenvolvedor</h3>
        <canvas id="devChart"></canvas>
    </div>

</div>

<div class="table">
    <h3>Demandas Atrasadas</h3>
    <table>
        <tr>
            <th>Desenvolvedor</th>
            <th>Status</th>
            <th>Data Entrega</th>
        </tr>

        <tr>
            <td>Breno</td>
            <td class="red">Atrasado</td>
            <td>16/06/2026</td>
        </tr>

        <tr>
            <td>Lourival</td>
            <td class="red">Atrasado</td>
            <td>18/06/2026</td>
        </tr>

    </table>
</div>

<script>
// gráfico de status
new Chart(document.getElementById('statusChart'), {
    type: 'bar',
    data: {
        labels: ['Concluído','Em andamento','On Hold','Cancelado'],
        datasets: [{
            data: [2490, 148, 21, 66],
            backgroundColor: [
                '#28a745',
                '#007bff',
                '#ffc107',
                '#dc3545'
            ]
        }]
    },
    options: {
        plugins: { legend: { display: false } }
    }
});

// gráfico desenvolvedor
new Chart(document.getElementById('devChart'), {
    type: 'bar',
    data: {
        labels: ['Breno','Lourival','Dennys','Bruno'],
        datasets: [{
            data: [677,330,177,161],
            backgroundColor: '#007bff'
        }]
    },
    options: {
        indexAxis: 'y',
        plugins: { legend: { display: false } }
    }
});
</script>

</body>
</html>
